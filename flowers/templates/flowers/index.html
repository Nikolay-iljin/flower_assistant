{% extends 'base.html' %}
{% block content %}


<div class="content">
    {% for m in posts %}
        <strong>{{ m.name }}</strong>
        <p>{{ m.content | truncatewords:20}}</p>
        <p><a href="{{ m.get_absolute_url }}">Читать пост</a></p>
{% if not forloop.last%}
    <hr>
{% endif %}
{% endfor %}

</div>

{% endblock %}
